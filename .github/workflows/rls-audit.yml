name: RLS Audit

# Verify that every public-schema table in Supabase has:
#   1. Row-Level Security (RLS) enabled
#   2. REVOKE ALL before any GRANT (SOSLeiria pattern)
#
# Runs on every push to main and on every pull request.
# Fails the check if any violation is detected.

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rls-audit:
    name: RLS Policy Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run RLS audit
        run: npm run audit:rls
